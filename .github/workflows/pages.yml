name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Custom apex domain: https://wikidown.org/
      APP_BASE: /app/
      CUSTOM_DOMAIN: wikidown.org
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Publish editor (Wikidown.Web)
        run: |
          dotnet publish src/Wikidown.Web/Wikidown.Web.csproj \
            -c Release \
            -o publish/web \
            -p:StaticWebAssetBasePath=app

      - name: Stage Pages output
        run: |
          mkdir -p publish/site
          # Marketing landing at the root.
          cp -r src/Wikidown.Site/. publish/site/
          # Editor PWA at /app/.
          mkdir -p publish/site/app
          cp -r publish/web/wwwroot/app/. publish/site/app/
          # Rewrite the editor base href so SPA routing works at /app/.
          sed -i 's#<base href="/" />#<base href="'"$APP_BASE"'" />#' publish/site/app/index.html
          # SPA fallback: serve the editor's index.html for unknown /app/* routes.
          cp publish/site/app/index.html publish/site/app/404.html
          # Disable Jekyll so /_framework/ and dotfiles are served.
          touch publish/site/.nojekyll
          # Bind the custom apex domain.
          echo "$CUSTOM_DOMAIN" > publish/site/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: publish/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
