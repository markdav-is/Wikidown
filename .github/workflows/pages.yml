name: pages

on:
  push:
    branches: [main]
    paths:
      - 'src/Wikidown.Site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CUSTOM_DOMAIN: wikidown.org
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - name: Stage Pages output
        run: |
          mkdir -p publish/site
          cp -r src/Wikidown.Site/. publish/site/
          touch publish/site/.nojekyll
          echo "$CUSTOM_DOMAIN" > publish/site/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: publish/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
