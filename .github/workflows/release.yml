name: release

on:
  push:
    branches: [main]
    paths:
      - 'Directory.Build.props'
      - 'src/Wikidown.Cli/**'
      - 'src/Wikidown.Mcp/**'
      - 'src/Wikidown.Core/**'
      - 'assets/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Test
        run: dotnet test Wikidown.slnf -c Release

      - name: Pack
        run: |
          dotnet pack src/Wikidown.Cli/Wikidown.Cli.csproj -c Release -o artifacts
          dotnet pack src/Wikidown.Mcp/Wikidown.Mcp.csproj -c Release -o artifacts

      - name: Push to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "::error::NUGET_API_KEY secret is not set" >&2
            exit 1
          fi
          dotnet nuget push "artifacts/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: wikidown-nupkgs
          path: artifacts/*.nupkg
