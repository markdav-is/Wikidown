name: release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Semver to publish (e.g. 0.1.0)
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Resolve version
        id: v
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            V="${{ github.event.release.tag_name }}"
          else
            V="${{ github.event.inputs.version }}"
          fi
          V="${V#v}"
          if [ -z "$V" ]; then
            echo "::error::Could not determine version" >&2
            exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Test
        run: dotnet test Wikidown.sln -c Release

      - name: Pack
        run: |
          dotnet pack src/Wikidown.Cli/Wikidown.Cli.csproj \
            -c Release -o artifacts \
            -p:Version=${{ steps.v.outputs.version }}
          dotnet pack src/Wikidown.Mcp/Wikidown.Mcp.csproj \
            -c Release -o artifacts \
            -p:Version=${{ steps.v.outputs.version }}

      - name: Push to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "::error::NUGET_API_KEY secret is not set" >&2
            exit 1
          fi
          dotnet nuget push "artifacts/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: wikidown-nupkgs-${{ steps.v.outputs.version }}
          path: artifacts/*.nupkg
